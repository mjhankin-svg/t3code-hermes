name: T3 Hermes image

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  image:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build test image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          load: true
          tags: t3code-hermes:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image contract
        run: |
          docker run --rm t3code-hermes:ci --version
          docker run --rm --entrypoint /opt/hermes/bin/hermes t3code-hermes:ci acp --check
          test "$(docker image inspect t3code-hermes:ci --format '{{.Config.User}}')" = "99:100"

      - name: Scan image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          image-ref: t3code-hermes:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish immutable image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: publish
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: ghcr.io/${{ github.repository_owner }}/t3code-hermes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest published image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/t3code-hermes
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
